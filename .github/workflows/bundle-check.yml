name: Bundle Size Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  bundle-check:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build with bundle analysis
        run: npm run build:strict
      
      - name: Generate bundle report
        if: always()
        run: |
          if [ -f .bundle-report.json ]; then
            echo "## 📦 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
            cat .bundle-report.json | jq '.bundles | map("- \(.name): \(.gzipped)KB (gzipped)")' -r >> $GITHUB_STEP_SUMMARY
            echo "**Total (gzipped): $( cat .bundle-report.json | jq '.totalGzipped' )KB**" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Comment PR with bundle report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('.bundle-report.json')) {
              const report = JSON.parse(fs.readFileSync('.bundle-report.json', 'utf8'));
              let comment = '## 📦 Bundle Size Report\n\n';
              
              comment += '| Bundle | Size (KB) | Gzipped (KB) |\n';
              comment += '|--------|-----------|---------------|\n';
              report.bundles.sort((a,b) => b.gzipped - a.gzipped).forEach(b => {
                const status = b.exceeds.length > 0 ? '⚠️' : '✅';
                comment += `| ${status} ${b.name} | ${b.size} | ${b.gzipped} |\n`;
              });
              
              comment += `\n**Total (gzipped): ${report.totalGzipped}KB**\n`;
              comment += `**Limit: ${report.limits.maxTotalGzipped}KB**\n`;
              
              if (report.violations.length > 0) {
                comment += '\n### ⚠️ Violations:\n';
                report.violations.forEach(v => {
                  comment += `- ${v}\n`;
                });
              } else {
                comment += '\n✅ All bundles within limits!';
              }
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
